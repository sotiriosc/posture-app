name: CI

on:
  pull_request:
  schedule:
    # Nightly full suite at 07:00 UTC
    - cron: "0 7 * * *"

jobs:
  # ─── PR gate ──────────────────────────────────────────────────────────────
  # Runs on every pull request. Fast enough to be a blocking gate (target:
  # under 3 minutes — see Phase 6f Commit 6 / ED-6f.8 in
  # docs/engine-decisions.md for how this set was chosen).
  pr-gate:
    name: PR gate (lint + critical tests + smoke e2e + both builds)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Boundary lint (R2/R3/R4) ──────────────────────────────────────────
      - name: Boundary lint
        run: >-
          npx eslint
          packages/engine/src
          apps/consumer/src
          apps/gyms/src

      # ── Critical (@critical) engine suite: golden/identity/determinism
      # anchors, catalog + ladder invariants, feedback contract, subscription
      # and offline-sync logic touched by recent phases. See
      # `test:critical` in package.json for the exact file list.
      - name: Critical engine tests
        run: npm run test:critical

      # ── Playwright smoke: first-run happy path + per-account isolation,
      # for both apps. Blocking per bloom-plan Phase 6f Commit 6.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke (consumer)
        run: npm run test:e2e:smoke:consumer

      - name: Playwright smoke (gyms)
        run: npm run test:e2e:smoke:gyms

      # ── Both apps build ───────────────────────────────────────────────────
      - name: Build consumer app
        run: npm run build --workspace=apps/consumer

      - name: Build gyms app
        run: npm run build --workspace=apps/gyms

  # ─── Nightly full suite ───────────────────────────────────────────────────
  # Runs on schedule only. Heavier — allows the full (@full) suite to run,
  # unchanged in scope from before Phase 6f's categorization pass.
  full-suite:
    name: Full engine suite (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full engine suite
        run: npm run test:full

      # Gyms-only tests run nightly too.
      - name: Run gyms suite
        run: npm run test:full:gyms
